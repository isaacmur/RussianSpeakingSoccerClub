# Supabase local dev configuration.
# Link to the hosted project later with: supabase link --project-ref <ref>
project_id = "weekend-league"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "weekendleague://"
additional_redirect_urls = ["weekendleague://"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true

# send-push is invoked by a Database Webhook, which authenticates with the
# project anon key as a Bearer token (added in the webhook's HTTP headers) —
# JWT verification stays ON. The function re-fetches the notification row by
# id, so a caller holding only the anon key can't push arbitrary content.
[functions.send-push]
verify_jwt = true
